summary:
  engine: ollama

  ollama:
    base_url: https://ollama.com
    model: gpt-oss:20b
    api_key_env: OLLAMA_API_KEY

email:
  sender_env: QQ_EMAIL
  auth_code_env: QQ_EMAIL_AUTH_CODE
  subject: 学校通知公告汇总
  recipients:
    - receiver@example.com

output:
  excel_path: outputs/学校通知汇总.xlsx

state:
  database_path: data/notice_crawler.db
  legacy_json_path: data/processed_links.json

retry:
  max_attempts: 3
  backoff_seconds:
    - 2
    - 4
    - 8

defaults:
  item_selector: tr
  title_selector: .news-title a
  date_selector: .news-date
  content_selector: .wp_articlecontent

sites:
  - name: 广西师范大学教务处学生公告
    list_url: http://www.dean.gxnu.edu.cn/xsgg/list.htm
